<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Varsha ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500&family=Alex+Brush&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-light: #fff6f7; 
            --rose-dark: #6e464a;
            --rose-main: #cf8d96; 
            --rose-soft: #fcdbd0;
            --soft-white: rgba(255, 255, 255, 0.94);
            --luxury-border: rgba(207, 141, 150, 0.25);
            --font-display: 'Cinzel', serif;
            --font-body: 'Montserrat', sans-serif;
            --font-script: 'Alex Brush', cursive;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-light);
            font-family: var(--font-body);
            color: #443335;
        }

        /* High Performance Visual Canvas */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .music-ctrl {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--luxury-border);
            padding: 8px 14px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--rose-dark);
            font-family: var(--font-body);
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            display: none;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 12px rgba(207, 141, 150, 0.12);
        }
        @media(max-width: 480px) {
            .music-ctrl { top: 12px; right: 12px; padding: 6px 10px; font-size: 8px; }
        }

        .experience-stage {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1), transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
            transform: scale(1.05);
            padding: 20px;
            text-align: center;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .luxury-card {
            background: var(--soft-white);
            border: 1px solid var(--luxury-border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 35px 30px;
            max-width: 560px;
            width: 100%;
            max-height: 82vh;
            overflow-y: auto;
            box-shadow: 0 15px 35px rgba(207, 141, 150, 0.1), inset 0 1px 0 rgba(255,255,255,0.8);
            transform: translateY(20px);
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .luxury-card::-webkit-scrollbar { width: 4px; }
        .luxury-card::-webkit-scrollbar-thumb { background: var(--rose-main); border-radius: 4px; }
        
        .screen.active .luxury-card { transform: translateY(0); }

        .cinematic-title {
            font-family: var(--font-display);
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--rose-dark);
            margin-bottom: 15px;
            font-size: 17px;
        }

        .luxury-script {
            font-family: var(--font-script);
            font-size: 3.5rem;
            color: var(--rose-main);
            margin-bottom: 10px;
        }

        .gold-input {
            background: #ffffff;
            border: 1px solid var(--luxury-border);
            padding: 12px 18px;
            border-radius: 10px;
            color: #332223;
            font-family: var(--font-body);
            font-size: 15px;
            letter-spacing: 1.5px;
            text-align: center;
            width: 100%;
            max-width: 240px;
            margin-top: 15px;
            outline: none;
        }
        .gold-input:focus {
            border-color: var(--rose-main);
            box-shadow: 0 0 12px rgba(207, 141, 150, 0.25);
        }

        .action-trigger {
            margin-top: 20px;
            background: linear-gradient(135deg, var(--rose-main), #f0aba2);
            border: none;
            padding: 14px 35px;
            border-radius: 25px;
            color: #ffffff;
            font-family: var(--font-body);
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(207, 141, 150, 0.25);
        }

        /* Interactive Animated Core Heart Controls */
        .heart-wrapper {
            margin-top: 25px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100%;
        }

        .heart-flow-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ffffff;
            border: 1px solid var(--luxury-border);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 10px rgba(207, 141, 150, 0.1);
        }
        .heart-flow-btn svg {
            width: 18px;
            height: 18px;
            fill: var(--rose-main);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .heart-flow-btn:hover { transform: scale(1.15); border-color: var(--rose-main); box-shadow: 0 6px 15px rgba(207, 141, 150, 0.2); }
        .heart-flow-btn:active svg { transform: scale(0.75); }

        .heart-guide-text {
            font-family: var(--font-body);
            font-size: 9px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--rose-dark);
            font-weight: 500;
            animation: softPulse 2s infinite ease-in-out;
        }

        .typewriter-vault {
            font-family: var(--font-body);
            font-weight: 400;
            font-size: 14px;
            line-height: 1.9;
            color: #4a3739;
            text-align: left;
            min-height: 110px;
            margin: 10px 0;
        }

        .emotional-prose {
            font-size: 14px;
            line-height: 1.8;
            font-weight: 400;
            color: #4a3739;
            margin-bottom: 12px;
        }

        .vow-list { text-align: left; max-width: 460px; margin: 15px auto; }
        .vow-item { display: flex; align-items: center; gap: 10px; margin: 12px 0; font-size: 13.5px; line-height: 1.6; }
        .vow-bullet { width: 5px; height: 5px; background: var(--rose-main); border-radius: 50%; flex-shrink: 0; }

        .toast-system {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #ffffff;
            border: 1px solid var(--rose-main);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 11px;
            letter-spacing: 1px;
            color: var(--rose-dark);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 10000;
        }
        .toast-system.awoken { opacity: 1; transform: translateX(-50%) translateY(0); }

        @keyframes softPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="cinemaSpace"></canvas>
    
    <button class="music-ctrl" id="musicBtn">

        Romantic Score Loop
    </button>
    
    <div class="toast-system" id="gatekeeperToast">Please enter the correct name with V capital ❤️</div>

    <div class="experience-stage">

        <div class="screen active" id="stage-gatekeeper">
            <div class="luxury-card" style="max-width: 440px;">
                <div class="luxury-script" style="font-size: 2.8rem;">Hey...</div>
                <h1 class="cinematic-title" style="font-size: 14px; margin-bottom: 10px; letter-spacing: 2px;">Maine tumhare liye kuch chhota sa banaya hai.</h1>
                <input type="text" id="passkeyField" class="gold-input" placeholder="Enter Your Name" autocomplete="off">
                <br>
                <button class="action
